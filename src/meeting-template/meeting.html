<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meeting Minutes Template</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            min-height: 100vh;
            padding-top: 6rem;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background: white;
            width: 800px;
            max-width: 600px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .title {
            font-size: 2.5rem;
            color: #166534;
            margin: 0;
            line-height: 1.2;
        }
        
        .date {
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        .feature-name {
            font-size: 1.5rem;
            color: #6b7280;
            margin: 0 0 1.5rem 0;
            padding: 0.5rem;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 500;
        }
        
        .feature-name:hover {
            border-color: #e5e7eb;
            border-radius: 0.5rem;
        }
        
        .feature-name-input {
            font-size: 1.5rem;
            padding: 0.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            width: 100%;
            color: #111827;
            margin-bottom: 1.5rem;
            font-family: inherit;
        }
        
        .add-task {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #111827;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #166534;
        }
        
        button {
            background: #166534;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background-color 0.2s ease;
        }
        
        button:hover {
            background: #14532d;
        }
        
        /* .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 1rem;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            gap: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background: white;
        }
        
        .task-item input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.25rem;
            cursor: pointer;
        }
        
        .task-item span {
            flex: 1;
            color: #111827;
            font-size: 0.875rem;
        } */

        /* Dark mode styles */
        body.dark-mode {
            background: #1a1a1a;
            color: #ffffff;
        }

        body.dark-mode .navbar,
        body.dark-mode .container,
        body.dark-mode .task-item {
            background: #2d2d2d;
        }

        body.dark-mode input[type="text"],
        body.dark-mode .feature-name-input {
            background: #404040;
            color: #ffffff;
            border-color: #404040;
        }

        body.dark-mode .task-item {
            border-color: #404040;
        }

        body.dark-mode .feature-name,
        body.dark-mode .task-item span {
            color: #ffffff;
        }

        body.dark-mode .feature-name:hover {
            border-color: #404040;
        }

        /* New CSS */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .save-btn {
            background: #64748b; /* Secondary color */
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .save-btn:hover {
            background: #475569;
        }

        .save-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .save-status {
            color: #64748b;
            font-size: 0.875rem;
            min-width: 120px;
            text-align: right;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        
        h1, h2 {
            margin-bottom: 0.8rem;
        }
        
        .section {
            margin-bottom: 1rem;
        }

        .section h2 {
            margin-bottom: 0.5rem;
            /* color: #4b5563; */
        }

        .input-field {
            margin-bottom: 1rem;
            width: 100%;
        }

        textarea, input {
            width: 100%;
            height: max-content;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 1rem;
        }

        .editable-container {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 1rem;
            min-height: 50px; /* Set a minimum height to make it look consistent */
            display: block;
            overflow: auto; /* Allows the content to scroll if it overflows */
            box-sizing: border-box;
        }

        .editable-container:focus {
            outline: none; /* Removes the default focus outline */
            border-color: #3b82f6; /* Highlights the border when focused */
            box-shadow: 0 0 0 2px #bfdbfe; /* Adds a subtle focus shadow */
        }


    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <div>☰</div>
            <div>DevLog</div>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Hinted search text">
                <span class="search-icon">🔍</span>
            </div>
            <div>🌙</div>
            <div>👤</div>
        </div>
    </nav>

    <div class="sidebar">
        <div class="sidebar-links">
            <a href="../index.html">Home</a>
            <a href="#">My Documents</a>
            <a href="#">Templates</a>
            <a href="#">Settings</a>
        </div>
    </div>

    <div class="overlay"></div>
    
    <div class="user-menu">
        <a href="#" class="block p-2">Profile</a>
        <a href="#" class="block p-2">Settings</a>
        <a href="#" class="block p-2">Logout</a>
    </div>

    <main>
        <div class="container">
            <div class="header-container">
                <h2>Meeting Minutes</h2>
                <div class="header-right">
                    <div class="save-status" id="saveStatus"></div>
                    <button class="save-btn secondary" id="saveButton" onclick="saveMeetingToDatabase()">
                        <span class="loading-spinner" id="saveSpinner"></span>
                        <span>Save</span>
                    </button>
                </div>
            </div>

            <h2 class="feature-name" id="meetingTitle" onclick="editMeetingTitle()">Click to add meeting title</h2>
            <div class="date" id="currentDate"></div>

            <div class="section">
                <h3>Attendees</h3>
                <input type="text" placeholder="Enter attendee names" class="input-field" id="attendees-input">
            </div>
            <div class="section">
                <h3>Status</h3>
                <select class="input-field" id="status-select">
                    <option value="planned">Planned</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="section">
                <h3>Date</h3>
                <input type="date" class="input-field" id="meeting-date">
            </div>
            <div class="section">
                <h3>Meeting Content</h3>
                <div class="editable-container" contenteditable="true" id="meeting-content">
                    <h3>Agenda</h3>
                    <ul>
                        <li>Discuss project milestones</li>
                        <li>Review team responsibilities</li>
                        <li>Set deadlines</li>
                    </ul>
                    <br>
                    <h3>Notes</h3>
                    <p>[Record meeting notes here]</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ============= INITIALIZATION (runs when page loads) =============
        document.addEventListener('DOMContentLoaded', function () {
            updateDate();
            loadMeetingDataFromStorage();
            const documentId = localStorage.getItem('meetingDocumentId');
            if (documentId) {
                loadMeetingDocumentFromBackend(documentId);
            }
        });

        // ============= SAVE FUNCTIONS =============
        async function saveMeetingToDatabase() {
            const saveButton = document.getElementById('saveButton');
            const saveSpinner = document.getElementById('saveSpinner');
            const saveStatus = document.getElementById('saveStatus');
            
            saveButton.disabled = true;
            saveSpinner.style.display = 'block';
            saveStatus.textContent = 'Saving...';

            const title = document.getElementById('meetingTitle').textContent;
            const attendees = document.getElementById('attendees-input').value;
            const status = document.getElementById('status-select').value;
            const meetingDate = document.getElementById('meeting-date').value;
            const content = document.getElementById('meeting-content').innerHTML;

            const meetingData = {
                title,
                attendees,
                status,
                meetingDate,
                content,
                template_type: 'meeting_minutes'
            };

            try {
                const documentId = localStorage.getItem('meetingDocumentId');
                const baseUrl = 'http://localhost:5500'; // Replace with your actual API URL
                const url = documentId ? `${baseUrl}/api/documents/${documentId}` : `${baseUrl}/api/documents`;
                const method = documentId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(meetingData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`Failed to save: ${errorData.error || 'Unknown error'}`);
                }

                const result = await response.json();
                if (!documentId && result.documentId) {
                    localStorage.setItem('meetingDocumentId', result.documentId);
                }

                saveStatus.textContent = 'Saved successfully';
                setTimeout(() => saveStatus.textContent = '', 3000);
            } catch (error) {
                console.error('Save failed:', error);
                saveStatus.textContent = `Failed to save: ${error.message}`;
            } finally {
                saveButton.disabled = false;
                saveSpinner.style.display = 'none';
            }
        }

        // ============= LOAD FUNCTIONS =============
        function loadMeetingDataFromStorage() {
            const title = localStorage.getItem('meetingTitle');
            const attendees = localStorage.getItem('meetingAttendees');
            const status = localStorage.getItem('meetingStatus');
            const meetingDate = localStorage.getItem('meetingDate');
            const content = localStorage.getItem('meetingContent');

            if (title) document.getElementById('meetingTitle').textContent = title;
            if (attendees) document.getElementById('attendees-input').value = attendees;
            if (status) document.getElementById('status-select').value = status;
            if (meetingDate) document.getElementById('meeting-date').value = meetingDate;
            if (content) document.getElementById('meeting-content').innerHTML = content;
        }

        async function loadMeetingDocumentFromBackend(documentId) {
            try {
                const baseUrl = 'http://localhost:5500'; // Replace with your actual API URL
                const response = await fetch(`${baseUrl}/api/documents/${documentId}`);

                if (!response.ok) throw new Error('Failed to load the document');

                const document = await response.json();
                document.getElementById('meetingTitle').textContent = document.title || 'Click to add meeting title';
                document.getElementById('attendees-input').value = document.attendees || '';
                document.getElementById('status-select').value = document.status || 'planned';
                document.getElementById('meeting-date').value = document.meetingDate || '';
                document.getElementById('meeting-content').innerHTML = document.content || '';

                localStorage.setItem('meetingDocumentId', documentId);
            } catch (error) {
                console.error('Failed to load document:', error);
            }
        }

        // ============= UTILITY FUNCTIONS =============
        function updateDate() {
            const dateElement = document.getElementById('currentDate');
            const now = new Date();
            dateElement.textContent = now.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function editMeetingTitle() {
            const meetingTitleElement = document.getElementById('meetingTitle');
            const currentName = meetingTitleElement.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'feature-name-input';
            input.value = currentName === 'Click to add meeting title' ? '' : currentName;

            input.onblur = function () {
                saveMeetingTitle(this.value);
            };

            input.onkeypress = function (e) {
                if (e.key === 'Enter') {
                    saveMeetingTitle(this.value);
                }
            };

            meetingTitleElement.parentNode.replaceChild(input, meetingTitleElement);
            input.focus();
        }

        function saveMeetingTitle(name) {
            const h2 = document.createElement('h2');
            h2.id = 'meetingTitle';
            h2.className = 'feature-name';
            h2.textContent = name.trim() || 'Click to add meeting title';
            h2.onclick = editMeetingTitle;

            const input = document.querySelector('.feature-name-input');
            input.parentNode.replaceChild(h2, input);

            localStorage.setItem('meetingTitle', h2.textContent);
        }
    </script>
    <script src="../script.js"></script>
</body>
</html>
