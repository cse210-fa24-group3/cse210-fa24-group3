<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Review Template - DevLog</title>
    <link rel="stylesheet" href="/cse210-fa24-group3/styles.css">
    <link rel="stylesheet" href="/cse210-fa24-group3/template.css">
    <!-- For HTML Only styles -->
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./template.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <div>☰</div>
            <div><a class="logo" href="/">DevLog</a></div>
        </div>
        <div class="navbar-right">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search entries">
                <span class="search-icon">🔍</span>
            </div>
            <div class="theme-toggle">
                <span class="light-mode">🌙</span>
                <span class="dark-mode" style="display:none;">☀️</span>
            </div>
            <div class="user-btn">👤</div>
        </div>
    </nav>

    <div class="sidebar">
        <div class="sidebar-links">
            <a href="/">Home</a>
            <a href="#">My Documents</a>
            <a href="/">Templates</a>
            <a href="#">Settings</a>
        </div>
    </div>

    <div class="overlay"></div>
    
    <div class="user-menu">
        <a href="#" class="block p-2">Profile</a>
        <a href="#" class="block p-2">Settings</a>
        <a href="#" class="block p-2">Logout</a>
    </div>

    <main class="main-content">
        <div class="container">
            <div class="header">
                <input type="text" class="title-input" placeholder="Untitled Bug Review ###" id="titleInput">
                <div class="header-right">
                    <div class="save-status" id="saveStatus"></div>
                    <button class="save-button" id="saveButton" onclick="saveDocument()">
                        <span>Save</span>
                    </button>
                </div>
            </div>
            <textarea class="content-area" id="contentArea">
Bug ID: [Tracking number from your system]
Title: [Short, descriptive title of the bug]
Priority: [Critical/High/Medium/Low]
Status: [Open/In Progress/Fixed/Closed]
Reported By: [Name]
Reported Date: [YYYY-MM-DD]

Environment Details
• Platform: [OS/Browser/Device]
• Version: [Application version number]
• Environment: [Development/Staging/Production]
• User Role: [Admin/Regular User/etc.]

Bug Description
• Current Behavior: [Detailed description of what is happening]
• Expected Behavior: [Description of what should happen]

Steps to Reproduce
1. [First step]
2. [Second step]
3. [Continue as needed]

Impact
• Users Affected: [Number or percentage of users]
• Business Impact: [Description of business implications]
• Functionality Impact: [Which features are affected]

Technical Analysis
• Root Cause: [Detailed technical explanation of what caused the bug]

Code Location
• File(s): [Relevant file paths]
• Function/Component: [Specific function or component names]
• Line Numbers: [If applicable]

Solution
[Code snippets and summary of changes made]

Lessons Learned
• Prevention Measures: [Steps to prevent similar bugs in the future]
• Documentation Updates: [Required changes to documentation]

Sign-off
• Fixed By: [Developer name]
• Reviewed By: [Reviewer name]
• QA Verified By: [QA engineer name]
• Fix Deployed Date: [YYYY-MM-DD]
            </textarea>
        </div>
    </main>

    <script src="/bug-review.js"></script>
    <script src="/script.js"></script>
</body>
</html>
